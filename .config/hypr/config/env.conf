# ENVIRONMENT VARIABLES

# ─── TOOLKIT BACKEND ────────────────────────────────────────────────
env = GDK_BACKEND,wayland,x11,*        # ✅ correct
env = QT_QPA_PLATFORM,wayland;xcb      # ✅ correct
env = SDL_VIDEODRIVER,wayland          # ✅ correct
env = CLUTTER_BACKEND,wayland          # ✅ correct

# ─── XDG SPECIFICATIONS ─────────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland     # ✅ correct
env = XDG_SESSION_TYPE,wayland         # ✅ correct
env = XDG_SESSION_DESKTOP,Hyprland    # ✅ correct

# ─── QT VARIABLES ───────────────────────────────────────────────────
env = QT_AUTO_SCREEN_SCALE_FACTOR,1    # ✅ correct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1  # ✅ correct

# ─── INTEL iGPU ─────────────────────────────────────────────────────
env = LIBVA_DRIVER_NAME,iHD            # ✅ correct (for modern Intel iGPUs)
env = VDPAU_DRIVER,va_gl               # ✅ correct
# env = LIBVA_DRIVER_NAME,i965         # for older Intel GPUs

# ─── NVIDIA (uncomment if applicable) ───────────────────────────────
# env = LIBVA_DRIVER_NAME,nvidia
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

# ─── CURSOR ─────────────────────────────────────────────────────────
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita

# ─── EDITOR ─────────────────────────────────────────────────────────
env = EDITOR,nvim
env = VISUAL,nvim
