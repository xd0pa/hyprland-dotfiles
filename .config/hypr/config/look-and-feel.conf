general {
    gaps_in  = 5
    gaps_out = 12
    border_size = 1

    col.active_border   = rgba(ffffff99)
    col.inactive_border = rgba(3a3a3a99)

    layout           = dwindle
    allow_tearing    = false
    resize_on_border = true
}

decoration {
    rounding = 12

    active_opacity   = 1.0
    inactive_opacity = 0.94

    shadow {
        enabled      = true
        range        = 15
        render_power = 2
        color        = rgba(00000066)
        offset       = 0 3
    }

    blur {
        enabled            = true
        size               = 4
        passes             = 2
        new_optimizations  = true
        xray               = false
        popups             = true
        popups_ignorealpha = 0.3
        ignore_opacity     = true
        brightness         = 0.85
        noise              = 0.015
        contrast           = 0.9
    }
}

animations {
    enabled = true

    # ── Beziers Ash ───────────────────────────────────
    bezier = ash,    0.25, 1.0, 0.5,  1.0
    bezier = weight, 0.4,  0.0, 0.2,  1.0
    bezier = quick,  0.22, 1.0, 0.36, 1.0

    # ── Ventanas ──────────────────────────────────────
    animation = windows,     1, 3, ash,    slide
    animation = windowsIn,   1, 3, ash,    popin 85%
    animation = windowsOut,  1, 2, weight, popin 80%
    animation = windowsMove, 1, 3, quick

    # ── Bordes y fade ─────────────────────────────────
    animation = border,  1, 4, weight
    animation = fade,    1, 3, weight
    animation = fadeOut, 1, 2, quick

    # ── Workspaces ────────────────────────────────────
    animation = workspaces,       1, 3, ash,    slide
    animation = specialWorkspace, 1, 3, weight, slidevert
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = false
    smart_resizing = true
}

master {
    new_status = master
    mfact      = 0.55
}

input {
    kb_layout = es
    follow_mouse = 1

    touchpad {
        natural_scroll       = true
        tap-to-click         = true
        drag_lock            = false
        disable_while_typing = true
        scroll_factor        = 1.0
    }

    sensitivity   = 0
    accel_profile = flat
}

misc {
    disable_hyprland_logo        = true
    disable_splash_rendering     = true
    mouse_move_enables_dpms      = true
    key_press_enables_dpms       = true
    vrr                          = 0
    enable_swallow               = true
    swallow_regex                = ^(kitty)$
    focus_on_activate            = true
    vfr                          = true
    animate_manual_resizes       = false
    animate_mouse_windowdragging = false
}
