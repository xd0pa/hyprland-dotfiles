## WINDOWS AND WORKSPACES

# ─── FLOATING WINDOWS ───────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          float on
windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(blueman-manager)$,      float on
windowrule = match:title ^(Picture-in-Picture)$,   float on
windowrule = match:title ^(Open File)$,            float on
windowrule = match:title ^(Save File)$,            float on
windowrule = match:title ^(Choose Files)$,         float on
windowrule = match:class ^(swaync)$,               float on
windowrule = match:title ^(.*is sharing your screen.*)$, float on

# ─── SIZES ──────────────────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          size 800 600
windowrule = match:class ^(nm-connection-editor)$, size 600 400

# ─── CENTER ─────────────────────────────────────────────────────────
windowrule = match:class ^(pavucontrol)$,          center on
windowrule = match:class ^(nm-connection-editor)$, center on
windowrule = match:class ^(blueman-manager)$,      center on

# ─── PICTURE-IN-PICTURE ─────────────────────────────────────────────
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 25% 25%
windowrule = match:title ^(Picture-in-Picture)$, move 74% 74%

# ─── POSITIONS ──────────────────────────────────────────────────────
windowrule = match:class ^(swaync)$,                     move 100%-420 50
windowrule = match:title ^(.*is sharing your screen.*)$, move 0 0

# ─── OPACITY ────────────────────────────────────────────────────────
windowrule = match:class .*, opacity 1.0 1.0
